version: '3.8'
services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ny_taxi
    volumes:
      - ny_taxi_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - pg-network

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8085:80"
    networks:
      - pg-network

  taxi_ingest:
    build: .
    depends_on:
      - pgdatabase
    networks:
      - pg-network
    environment:
      PG_USER: root
      PG_PASS: root
      PG_HOST: pgdatabase
      PG_PORT: 5432
      PG_DB: ny_taxi
      TARGET_TABLE: yellow_taxi_trips

volumes:
  ny_taxi_postgres_data:
  pgadmin_data:

networks:
  pg-network:
    driver: bridge
    